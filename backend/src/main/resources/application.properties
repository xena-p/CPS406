spring.application.name=scrum-development


app.jwt.secret=${JWT_SECRET_KEY}

#DB connection
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

#JPA / Hibernate Properties
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
#update compares Java @Entity classes to the DB and add missing columns/tables
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true


#hikari connection pool settings so that its not too slow to connect to the DB
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

spring.datasource.hikari.keepalive-time=60000